services:
  rust:
    image: counter_rust:latest
    networks:
      - main_net
      - monitor_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
    volumes:
      - ./saved_state.json:${RUST_STATE_PATH}
    secrets:
      - RUST_HASH_SALT
    logging:
      driver: loki
      options:
        mode: non-blocking
        loki-url: ${LOKI_URL}
        loki-batch-size: "10"
        loki-timeout: "10s"
        loki-retries: "3"
    environment:
      - RUST_PORT=${RUST_PORT}
      - RUST_LOG=${RUST_LOG}
      - SVELTE_URL=${SVELTE_URL}
      - RUST_STATE_PATH=${RUST_STATE_PATH}
      - RUST_MAX_CONNECTIONS_PER_IP=${RUST_MAX_CONNECTIONS_PER_IP}
      - RUST_TIMEOUT_MIN=${RUST_TIMEOUT_MIN}
      - RUST_MSG_DELAY_MS=${RUST_MSG_DELAY_MS}

  svelte:
    image: counter_svelte:latest
    networks:
      - main_net
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s
    environment:
      - PORT=${SVELTE_PORT}
      - NODE_ENV=${NODE_ENV}

  caddy:
    image: counter_caddy:latest
    networks:
      - main_net
      - cloud_net
    ports:
      - "80:80"
      - "443:443"
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
        delay: 5s
    logging:
      driver: loki
      options:
        mode: non-blocking
        loki-url: ${LOKI_URL}
        loki-batch-size: "10"
        loki-timeout: "10s"
        loki-retries: "3"
    secrets:
      - CLOUDFLARE_ZONE_TOKEN
    environment:
      - CADDY_LOG_ROTATE_DAYS=356
      - CADDY_LOG_ROTATE_SIZE=10000
      - CADDY_DOMAIN=${CADDY_DOMAIN}
      - RUST_NAME=${RUST_NAME}
      - RUST_PORT=${RUST_PORT}
      - SVELTE_NAME=${SVELTE_NAME}
      - SVELTE_PORT=${SVELTE_PORT}
    command: sh -c "export CLOUDFLARE_ZONE_TOKEN=$$(cat /run/secrets/CLOUDFLARE_ZONE_TOKEN) && caddy run --config /etc/caddy/Caddyfile"
    volumes:
      - ./caddy/data:/data
      - ./caddy/config:/config
      - ./caddy/logs:/var/log/caddy
      - ./caddy/config/Caddyfile:/etc/caddy/Caddyfile

  cloudflared:
    image: cloudflare/cloudflared:latest
    networks:
      - cloud_net
    deploy:
      placement:
        constraints: [node.role == manager]
    command: tunnel run --token-file /run/secrets/CLOUDFLARE_TUNNEL_TOKEN
    secrets:
      - CLOUDFLARE_TUNNEL_TOKEN

secrets:
  RUST_HASH_SALT:
    external: true
  CLOUDFLARE_ZONE_TOKEN:
    external: true
  CLOUDFLARE_TUNNEL_TOKEN:
    external: true

networks:
  main_net:
    driver: overlay
    name: main_net
  monitor_net:
    external: true
    name: monitor_net
  cloud_net:
    driver: overlay
    name: cloud_net
